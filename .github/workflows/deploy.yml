name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; in-progress deploy is cancelled on new push
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bake all secrets into config.js at build time.
      # Python handles JSON escaping correctly (private key newlines, etc.)
      - name: Generate config.js from secrets
        env:
          ADMIN_PASSWORD:       ${{ secrets.ADMIN_PASSWORD }}
          TCC_PAT:              ${{ secrets.TCC_PAT }}
          GIST_CREDENTIALS_ID:  ${{ secrets.GIST_CREDENTIALS_ID }}
          GIST_INDEX_ID:        ${{ secrets.GIST_INDEX_ID }}
          GIST_LEAVE_ID:        ${{ secrets.GIST_LEAVE_ID }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          GAMES_JSON:           ${{ secrets.GAMES_JSON }}
        run: |
          python3 << 'PYEOF'
          import os, json, sys

          def require(key):
              val = os.environ.get(key, '').strip()
              if not val:
                  print(f'ERROR: secret {key} is empty or missing', file=sys.stderr)
                  sys.exit(1)
              return val

          try:
              service_account = json.loads(require('SERVICE_ACCOUNT_JSON'))
          except json.JSONDecodeError as e:
              print(f'ERROR: SERVICE_ACCOUNT_JSON is not valid JSON: {e}', file=sys.stderr)
              sys.exit(1)

          try:
              games = json.loads(require('GAMES_JSON'))
          except json.JSONDecodeError as e:
              print(f'ERROR: GAMES_JSON is not valid JSON: {e}', file=sys.stderr)
              sys.exit(1)

          config = {
              'ADMIN_PASSWORD':       require('ADMIN_PASSWORD'),
              'GITHUB_PAT':           require('TCC_PAT'),
              'GIST_CREDENTIALS_ID':  require('GIST_CREDENTIALS_ID'),
              'GIST_INDEX_ID':        require('GIST_INDEX_ID'),
              'GIST_LEAVE_ID':        os.environ.get('GIST_LEAVE_ID', ''),
              'DRIVE_ROOT_FOLDER_ID': require('DRIVE_ROOT_FOLDER_ID'),
              'SERVICE_ACCOUNT':      service_account,
              'GAMES':                games,
          }

          with open('config.js', 'w') as f:
              f.write('const CONFIG = ')
              json.dump(config, f, indent=2, ensure_ascii=False)
              f.write(';\n')

          print('config.js generated successfully')
          PYEOF

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
