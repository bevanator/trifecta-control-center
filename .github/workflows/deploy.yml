name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Generates config.js in the repo root from secrets.
      # Uses a committed script to avoid heredoc/escaping issues in YAML.
      - name: Generate config.js
        env:
          ADMIN_PASSWORD:       ${{ secrets.ADMIN_PASSWORD }}
          TCC_PAT:              ${{ secrets.TCC_PAT }}
          GIST_CREDENTIALS_ID:  ${{ secrets.GIST_CREDENTIALS_ID }}
          GIST_INDEX_ID:        ${{ secrets.GIST_INDEX_ID }}
          GIST_LEAVE_ID:        ${{ secrets.GIST_LEAVE_ID }}
          DRIVE_ROOT_FOLDER_ID: ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          SERVICE_ACCOUNT_JSON: ${{ secrets.SERVICE_ACCOUNT_JSON }}
          GAMES_JSON:           ${{ secrets.GAMES_JSON }}
        run: python3 scripts/generate_config.py

      # Abort now if config.js is missing — no point deploying a broken site.
      - name: Verify config.js exists
        run: |
          if [ ! -f config.js ]; then
            echo "::error::config.js was not generated. Check the previous step."
            exit 1
          fi
          BYTES=$(wc -c < config.js)
          echo "config.js verified: ${BYTES} bytes"
          # Print first line only (avoids leaking secrets in logs)
          head -1 config.js

      # Assemble an explicit _site/ directory so we control exactly what
      # gets deployed — no surprises from uploading the whole repo root.
      # config.js goes inside dashboard/ so the script tag (src="config.js")
      # loads it from the same directory — no path traversal, no ambiguity.
      - name: Assemble deployment directory
        run: |
          mkdir -p _site/dashboard
          cp index.html        _site/
          cp config.example.js _site/
          cp -r dashboard/*    _site/dashboard/
          cp config.js         _site/dashboard/config.js
          echo "--- _site/ ---"
          ls -la _site/
          echo "--- _site/dashboard/ ---"
          ls -la _site/dashboard/
          echo "--- config.js present: $(test -f _site/dashboard/config.js && echo YES || echo NO) ---"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
