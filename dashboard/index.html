<!DOCTYPE html>
<html lang="en">
<head>
  <script src="config.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trifecta Control Center</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ── Login ─────────────────────────────────────────────── -->
<div class="login-page" id="login-page">
  <div class="login-card">
    <div class="login-mark"><img src="logo.png" alt="Trifecta" style="width:84px;height:auto;display:block;"></div>
    <div class="login-title">Trifecta Control Center</div>
    <div class="login-sub">Studio internal dashboard</div>
    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="login-password">Admin password</label>
        <input class="input input-lg" type="password" id="login-password" autofocus placeholder="Enter password…" style="width:100%">
      </div>
      <div id="login-error" style="font-size:11px;color:var(--red-text);margin-bottom:10px;min-height:16px"></div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center">
        <i class="ti ti-lock-open"></i> Sign in
      </button>
    </form>
  </div>
</div>

<!-- ── App shell ─────────────────────────────────────────── -->
<div class="app" id="app" hidden>
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-mark"><img src="logo.png" alt="Trifecta" style="width:84px;height:auto;display:block;"></div>
      <div class="sidebar-name">Control Center</div>
      <div class="sidebar-sub">Studio Dashboard</div>
    </div>

    <div class="nav-section">
      <span class="nav-label">Studio</span>
      <a class="nav-item" data-page="assets" href="#assets">
        <i class="ti ti-package"></i> Assets
      </a>
      <a class="nav-item" data-page="credentials" href="#credentials">
        <i class="ti ti-users"></i> Credentials
      </a>
      <a class="nav-item" data-page="analytics" href="#analytics">
        <i class="ti ti-chart-bar"></i> Analytics
      </a>
    </div>

    <div class="sidebar-footer">
      <button id="theme-toggle" class="nav-item">
        <i class="ti ti-moon" id="theme-icon"></i>
        <span id="theme-label">Dark mode</span>
      </button>
      <button id="logout-btn" class="nav-item" style="color:var(--text-tertiary)">
        <i class="ti ti-logout"></i> Logout
      </button>
    </div>
  </aside>

  <main class="main" id="content"></main>
</div>

<!-- ── Modal ─────────────────────────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" hidden>
  <div class="modal" id="modal"></div>
</div>

<!-- ── Toasts ────────────────────────────────────────────── -->
<div class="toast-stack" id="toast-stack"></div>

<!-- ── Scripts ───────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
<script>window.bcrypt = window.bcrypt || (window.dcodeIO && window.dcodeIO.bcrypt);</script>
<script src="js/auth.js"></script>
<script src="js/github.js"></script>
<script src="js/drive.js"></script>
<script src="js/analytics-api.js"></script>
<script src="js/pages/assets.js"></script>
<script src="js/pages/credentials.js"></script>
<script src="js/pages/analytics.js"></script>
<script src="js/app.js"></script>
</body>
</html>
